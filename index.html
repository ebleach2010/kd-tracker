/* ==========================================================================
   FEATURE VECTORS + CORRELATION / INSIGHTS ENGINE
   Transparent: every finding exposes n, r, prior, confidence, timing.
   ========================================================================== */
const Insights = {
  // ad-hoc one-liner note tags that recur on >=3 days become lightweight variables
  noteTags(){ const days={};
    D().assessments.forEach(a=>{ const k=dayKey(a.ts); (a.noteTags||[]).forEach(t=>{ const s=t.trim().toLowerCase(); if(!s)return; (days[s]=days[s]||new Set()).add(k); }); });
    return Object.keys(days).filter(s=>days[s].size>=3); },
  // one feature vector per calendar day (averages if multiple assessments)
  dayVectors(){
    const byDay={};
    D().assessments.forEach(a=>{ const k=dayKey(a.ts); (byDay[k]=byDay[k]||[]).push(a); });
    const days=Object.keys(byDay).sort();
    const stopWin={}; D().meds.forEach(m=>stopWin[m.id]=Derive.medStopWindow(m.id));
    const noteTags=this.noteTags();
    const regimenMeds=[...new Set(D().regimenLog.map(r=>r.medId))];
    return days.map(k=>{
      const list=byDay[k]; const ts=list[0].ts; const v={ _day:k, _ts:ts };
      // average sliders
      CONFIG.sliders.forEach(s=>{ const vals=list.map(a=>a.sliders[s.key]).filter(x=>x!=null); if(vals.length)v[s.key]=Stats.mean(vals); });
      CONFIG.exertion.forEach(s=>{ const vals=list.map(a=>a.exertion&&a.exertion[s.key]).filter(x=>x!=null); if(vals.length)v[s.key]=Stats.mean(vals); });
      // mood (wake + end-of-day + the AM→PM shift), incl. standalone morning logs
      const endM=list.map(a=>a.sliders&&a.sliders.moodEnd).filter(x=>x!=null);
      let wakeM=list.map(a=>a.sliders&&a.sliders.moodWake).filter(x=>x!=null);
      D().moodLogs.filter(m=>m.type==='wake'&&dayKey(m.ts)===k).forEach(m=>wakeM.push(m.value));
      if(endM.length)v.moodEnd=Stats.mean(endM); if(wakeM.length)v.moodWake=Stats.mean(wakeM);
      if(v.moodEnd!=null&&v.moodWake!=null)v.moodDelta=v.moodEnd-v.moodWake;
      // meals — prefer the Meals tab (per-meal toggles); fall back to old assessment meals
      const md=(D().mealDays||{})[k];
      if(md){ const meals=['breakfast','lunch','dinner'];
        meals.forEach(mk=>{ const mm=md[mk]; if(mm==null)return; v[mk+'_ate']=mm.ate?1:0;
          if(!mm.ate) v[mk+'_skipUnintent']=(mm.intentional===false)?1:0; });
        v.mealsAte=meals.filter(mk=>md[mk]&&md[mk].ate).length;
        v.mealsSkipped=meals.filter(mk=>md[mk]&&!md[mk].ate).length;
        v.mealsSkipUnintent=meals.filter(mk=>md[mk]&&!md[mk].ate&&md[mk].intentional===false).length;
        if(md.quality!=null)v.mealQuality=md.quality;
      } else {
        const meal=list.map(a=>a.meals).filter(m=>m&&m.quality!=null);
        if(meal.length){ v.mealQuality=Stats.mean(meal.map(m=>m.quality)); v.mealsAte=Stats.mean(meal.map(m=>({'1':1,'2':2,'3':3,'3+':4})[m.count]||2));
          v.mealSkip=Stats.mean(meal.map(m=>m.consistency==='skip'?(m.skipIntent==='intentional'?0.3:-1):0)); }
      }
      // sleep
      const sl=list.map(a=>a.sleep).filter(s=>s&&s.totalSleepMin!=null);
      if(sl.length){ v.sleepMin=Stats.mean(sl.map(s=>s.totalSleepMin)); v.sleepEff=Stats.mean(sl.map(s=>s.efficiency||0)); }
      // vitals (from assessment + standalone)
      const gl=[]; list.forEach(a=>(a.glucose||[]).forEach(g=>gl.push(g.value)));
      D().vitals.filter(x=>x.type==='glucose'&&dayKey(x.ts)===k).forEach(g=>gl.push(g.value));
      if(gl.length){ const gmean=Stats.mean(gl), gsd=Stats.sd(gl);
        v.glucoseMean=gmean; v.glucoseVar=gsd;
        v.glucoseStability=clamp(100-(gmean?gsd/gmean*100:0),0,100); // % stability across the day (100 − CV%)
        if(gl.length>=2){ v.glucoseSpike=Math.max(...gl); v.glucoseTrough=Math.min(...gl); v.glucoseRange=Math.max(...gl)-Math.min(...gl); } }
      // meds: deviation events per med (acute change/timing vs chronic regimen change; 0mg = missed)
      D().meds.forEach(m=>{ let changes=0,missed=0,added=0,chronic=0,doseSum=0,doseN=0;
        const tally=e=>{ if(e.medId!==m.id)return; if(e.deviation==='missed'||e.dose===0)missed++;
          else { if(e.changeType==='chronic')chronic++; else changes++; if(typeof e.dose==='number'){doseSum+=e.dose;doseN++;} added++; } };
        list.forEach(a=>(a.meds||[]).forEach(tally));
        D().medLogs.filter(e=>dayKey(e.ts)===k).forEach(tally);
        if(missed)v['med_'+m.id+'_missed']=missed;
        if(changes||added)v['med_'+m.id+'_change']=changes+added;
        if(chronic)v['med_'+m.id+'_chronic']=chronic;
        if(doseN)v['med_'+m.id+'_mg']=doseSum/doseN;
        // post-stop (rebound/withdrawal) window: days since a streak ended + how long it ran
        const sw=stopWin[m.id]&&stopWin[m.id][k];
        if(sw){ v['med_'+m.id+'_afterStop']=sw.afterStop; v['med_'+m.id+'_streakLen']=sw.streakLen; } });
      // "too unwell to log" crash day (heavily negative)
      v.tooUnwell=list.some(a=>a.tooUnwell)?1:0;
      // "too unwell to finish" — partial entry, a light covariate (may reflect fatigue, not inflammation)
      v.partialDay=list.some(a=>a.partial)?1:0;
      // self-care (binary per activity today)
      D().selfCareTypes.forEach(item=>{ const did=list.some(a=>(a.selfCare||[]).includes(item));
        v['sc_'+item]=did?1:0; });
      // ad-hoc one-liner note tags (lightly weighted extra variables)
      const dayNotes=new Set(); list.forEach(a=>(a.noteTags||[]).forEach(t=>dayNotes.add(t.trim().toLowerCase())));
      noteTags.forEach(t=>{ v['note_'+t]=dayNotes.has(t)?1:0; });
      // regimen state in effect on this day (from the Meds tab change-log)
      regimenMeds.forEach(mid=>{ const st=rxStateOn(mid, ts); if(!st)return;
        v['rx_'+mid+'_active']=(st.status==='stopped'||st.freq==='stopped')?0:1;
        v['rx_'+mid+'_freqN']=FREQ_ORD[st.freq]!=null?FREQ_ORD[st.freq]:0;
        if(typeof st.dose==='number')v['rx_'+mid+'_dose']=st.dose; });
      // derived episode/IVIG (incl. PK-informed effect-on-board: acute + sustained)
      v.daysSinceIVIG=Derive.daysSinceIVIG(ts);
      const ivc=Derive.ivigContext(ts);
      if(ivc){ v.ivig_effect=Math.round(ivc.total*100); v.ivig_acute=Math.round(ivc.acute*100); v.ivig_sustained=Math.round(ivc.sustained*100); }
      D().toggleTypes.forEach(t=>{ v['ep_'+t.id+'_active']=Derive.episodeActive(t.id,ts)?1:0;
        const since=Derive.daysSinceEnded(t.id,ts); if(since!=null&&since<=10)v['ep_'+t.id+'_after']=since; });
      // weekly objective + indices
      const wk=list.find(a=>a.cadence==='weekly'&&a.objective);
      if(wk){ ['obj_processingSpeed','obj_rtVariability','obj_workingMemory','obj_attention','obj_recall'].forEach(kk=>{ if(wk.objective[kk]!=null)v[kk]=wk.objective[kk]; });
        // stimulant effect level on board at the cognitive test (PK-aware)
        D().meds.filter(m=>m.cogEnhancer).forEach(m=>{ const c=(wk.medContext||[]).find(x=>x.medId===m.id); v['cogmed_'+m.id+'_effect']=c?c.effect:0; }); }
      return v;
    });
  },
  // curated predictor/outcome variable definitions with friendly labels
  vars(){
    const V={};
    CONFIG.sliders.forEach(s=>V[s.key]={label:s.label,kind:'symptom'});
    V.mental={label:'Mental exertion',kind:'predictor'}; V.physical={label:'Physical exertion',kind:'predictor'};
    V.mealQuality={label:'Meal quality',kind:'predictor'}; V.mealsAte={label:'Meals eaten',kind:'predictor'};
    V.mealsSkipped={label:'Meals skipped',kind:'predictor'}; V.mealsSkipUnintent={label:'Unintentional meal skips',kind:'predictor'};
    V.mealSkip={label:'Meal consistency (signed)',kind:'predictor'};
    ['breakfast','lunch','dinner'].forEach(mk=>{ V[mk+'_ate']={label:mk.charAt(0).toUpperCase()+mk.slice(1)+' eaten',kind:'predictor'}; V[mk+'_skipUnintent']={label:mk.charAt(0).toUpperCase()+mk.slice(1)+' skipped (unintentional)',kind:'predictor'}; });
    V.sleepMin={label:'Total sleep time',kind:'predictor'}; V.sleepEff={label:'Sleep efficiency',kind:'predictor'};
    V.glucoseMean={label:'Glucose (mean)',kind:'predictor'}; V.glucoseVar={label:'Glucose variability',kind:'predictor'};
    V.glucoseStability={label:'Glucose stability % (day)',kind:'predictor'}; V.glucoseSpike={label:'Glucose spike (daily max)',kind:'predictor'};
    V.glucoseTrough={label:'Glucose trough (daily min)',kind:'predictor'}; V.glucoseRange={label:'Glucose swing (max−min)',kind:'predictor'};
    V.daysSinceIVIG={label:'Days since IVIG',kind:'predictor'};
    V.ivig_effect={label:'IVIG effect on board (PK)',kind:'predictor'};
    V.ivig_acute={label:'IVIG acute effect (first days)',kind:'predictor'};
    V.ivig_sustained={label:'IVIG sustained level (PK)',kind:'predictor'};
    V.tooUnwell={label:'Too unwell to log (crash day)',kind:'predictor'};
    V.partialDay={label:'Partial entry (too unwell to finish)',kind:'predictor'};
    V.moodWake={label:'Morning mood',kind:'predictor'}; V.moodEnd={label:'End-of-day mood',kind:'symptom'};
    V.moodDelta={label:'Mood shift (AM→PM)',kind:'predictor'};
    D().selfCareTypes.forEach(item=>{ V['sc_'+item]={label:item,kind:'predictor'}; });
    this.noteTags().forEach(t=>{ V['note_'+t]={label:'Note: '+t,kind:'predictor'}; });
    D().meds.forEach(m=>{ V['med_'+m.id+'_change']={label:m.name+' dose change',kind:'predictor'}; V['med_'+m.id+'_missed']={label:m.name+' missed',kind:'predictor'};
      V['med_'+m.id+'_chronic']={label:m.name+' chronic-regimen change',kind:'predictor'};
      V['med_'+m.id+'_mg']={label:m.name+' dose (mg)',kind:'predictor'};
      V['med_'+m.id+'_afterStop']={label:'Days since stopping '+m.name,kind:'predictor'};
      V['med_'+m.id+'_streakLen']={label:m.name+' prior streak length',kind:'predictor'}; });
    D().toggleTypes.forEach(t=>{ V['ep_'+t.id+'_active']={label:t.label+' (active)',kind:'predictor'};
      V['ep_'+t.id+'_after']={label:'Days since '+t.label+' ended',kind:'predictor'}; });
    D().meds.filter(m=>m.cogEnhancer).forEach(m=>{ V['cogmed_'+m.id+'_effect']={label:m.name+' effect level at test',kind:'predictor'}; });
    [...new Set(D().regimenLog.map(r=>r.medId))].forEach(mid=>{ const nm=medName(mid);
      V['rx_'+mid+'_freqN']={label:nm+' frequency (regimen)',kind:'predictor'};
      V['rx_'+mid+'_active']={label:nm+' active (regimen)',kind:'predictor'};
      V['rx_'+mid+'_dose']={label:nm+' dose (regimen)',kind:'predictor'}; });
    V.obj_processingSpeed={label:'Processing speed (obj)',kind:'objective'}; V.obj_rtVariability={label:'RT variability (obj)',kind:'objective'};
    V.obj_workingMemory={label:'Working memory (obj)',kind:'objective'}; V.obj_attention={label:'Attention (obj)',kind:'objective'};
    return V;
  },
  prior(a,b){ return D().priors.find(p=>(p.a===a&&p.b===b)||(p.a===b&&p.b===a)); },
  compute(){
    const vecs=this.dayVectors();
    const nDays=vecs.length;
    const spanDays=nDays?((vecs[nDays-1]._ts-vecs[0]._ts)/DAY):0;
    if(nDays<5||spanDays<7) return {locked:true, nDays, spanDays:Math.round(spanDays)};
    const V=this.vars();
    const keys=Object.keys(V);
    const outcomes=keys.filter(k=>V[k].kind==='symptom'||V[k].kind==='objective');
    const predictors=keys.filter(k=>V[k].kind!=='objective');
    const lags=[0,1,2,3,7]; // acute (same/next-day) → subacute/chronic (up to a week later)
    const series=k=>vecs.map(v=>v[k]==null?null:+v[k]);
    // precompute detrended residuals (subtract local rolling median) to guard against
    // spurious shared-trend correlations, and a fast day→index map for lag alignment.
    const detr={}; [...new Set([...predictors,...outcomes])].forEach(k=>{ detr[k]=Stats.detrend(series(k),7); });
    const idxByDay={}; vecs.forEach((v,i)=>{ idxByDay[v._day]=i; });
    const tgtIndex=(v,lag)=>{ const d=new Date(v._ts+lag*DAY); return idxByDay[dayKey(d.getTime())]; };
    const pending=[];
    for(const pk of predictors){
      const pv=series(pk); const present=pv.filter(x=>x!=null);
      if(present.length<5) continue;
      const counts={}; present.forEach(x=>{const kk=Math.round(x*100);counts[kk]=(counts[kk]||0)+1;});
      const lowVar=Math.max(...Object.values(counts))/present.length>0.9; // near-constant → skip level corr
      for(const ok of outcomes){ if(ok===pk) continue;
        for(const lag of lags){
          const xs=[],ys=[],dxs=[],dys=[];
          vecs.forEach((v,i)=>{ if(v[pk]==null)return; const ti=tgtIndex(v,lag);
            if(ti!=null && vecs[ti][ok]!=null){ xs.push(+v[pk]); ys.push(+vecs[ti][ok]);
              if(detr[pk][i]!=null&&detr[ok][ti]!=null){ dxs.push(detr[pk][i]); dys.push(detr[ok][ti]); } } });
          if(xs.length<6) continue;
          if(lowVar && lag===0) continue;
          const kr=Stats.kendall(xs,ys);                                   // raw monotonic
          const kd=dxs.length>=6?Stats.kendall(dxs,dys):{r:kr.r,n:kr.n,p:kr.p}; // detrended (honest)
          const dcor=lag===0?Stats.distanceCorr(xs,ys):0;                  // general/non-monotonic (concurrent only, for speed)
          const tauRaw=kr.r, tauDet=kd.r, n=kr.n, pval=kd.p;
          const trendDriven = Math.abs(tauRaw)>0.28 && Math.abs(tauDet)<0.15;   // vanished after detrending
          const nonMonotonic = dcor>0.38 && Math.abs(tauDet)<0.2;              // dependence but weak monotonic
          const src = dxs.length>=8?[dxs,dys]:[xs,ys]; const half=Math.floor(src[0].length/2);
          const r1=Stats.kendall(src[0].slice(0,half),src[1].slice(0,half)).r;
          const r2=Stats.kendall(src[0].slice(half),src[1].slice(half)).r;
          const repro=(Math.sign(r1)===Math.sign(r2)&&Math.abs(r1)>.1&&Math.abs(r2)>.1)?0.9:(Math.sign(r1)===Math.sign(r2)?0.55:0.2);
          const prior=this.prior(pk,ok);
          const effR = nonMonotonic ? Math.max(Math.abs(tauDet), dcor*0.7) : Math.abs(tauDet);
          const signed = (tauDet<0 && !nonMonotonic) ? -effR : effR;
          const rEst=Stats.shrink(signed, n, prior);
          let conf=Stats.confidence(rEst,n,repro);
          if(pk.startsWith('note_')||ok.startsWith('note_')) conf=Math.round(conf*0.7);
          if(trendDriven) conf=Math.round(conf*0.5);
          if(conf<25) continue;
          pending.push({ pk, ok, lag, tauRaw:+tauRaw.toFixed(2), tauDet:+tauDet.toFixed(2), dcor:+dcor.toFixed(2),
            n, p:pval, prior:!!prior, conf, trendDriven, nonMonotonic, r:+rEst.toFixed(2), rObs:+tauRaw.toFixed(2) });
        }
      }
    }
    // keep best lag per pair, then FDR-correct across surviving pairs
    const best={}; pending.forEach(f=>{ const k=f.pk+'|'+f.ok; if(!best[k]||f.conf>best[k].conf)best[k]=f; });
    let list=Object.values(best);
    Stats.bh(list, 0.1);
    list.forEach(f=>this.decorate(f, V));
    list.sort((a,b)=>b.conf-a.conf);
    const interactions=this.findInteractions(vecs, V, best);
    const pathways=this.findPathways(list, V);
    const ws=this.wellSampledCount();
    return { locked:false, nDays, spanDays:Math.round(spanDays), findings:list, interactions, pathways,
      missedDays:this.gapDays(vecs), wellSampled:ws, laterUnlocked: ws>=100 };
  },
  // attach human-readable type + plain-language definition to a finding
  decorate(f, V){ f.pLabel=V[f.pk].label; f.oLabel=V[f.ok].label;
    f.timing = f.lag===0?'same-day':(f.lag===1?'next-day':(f.lag>=7?'a week later':f.lag+'-day delay'));
    f.chronic = f.lag>=7||f.pk.endsWith('_afterStop')||f.pk.endsWith('_streakLen')||f.pk.endsWith('_chronic')||f.pk.endsWith('_after');
    f.after = f.pk.endsWith('_after')||f.pk.endsWith('_afterStop');
    f.confound = (f.pk.startsWith('ep_')&&f.ok==='sleepQuality');
    const dirWord = f.nonMonotonic?'Non-monotonic':(f.tauDet>0?'Positive':(f.tauDet<0?'Negative':'No'));
    f.typeLabel = dirWord+' · '+(f.lag===0?'concurrent':'lagged '+f.lag+'d')+' · '+(f.nonMonotonic?'nonlinear':'monotonic')+(f.trendDriven?' · possibly trend-driven':'')+(f.fdr?'':' · not FDR-significant');
    f.definition = f.nonMonotonic
      ? 'Non-monotonic: '+f.pLabel.toLowerCase()+' and '+f.oLabel.toLowerCase()+' are related but not in a single straight direction (e.g. both too little and too much track with change) — inspect the shape.'
      : (f.tauDet>0
        ? 'Positive'+(f.lag>0?' ('+f.timing+')':'')+': as '+f.pLabel.toLowerCase()+' goes up, '+f.oLabel.toLowerCase()+' tends to go up too.'
        : 'Negative'+(f.lag>0?' ('+f.timing+')':'')+': as '+f.pLabel.toLowerCase()+' goes up, '+f.oLabel.toLowerCase()+' tends to go down.');
  },
  // "well-sampled" day = a complete day: morning (day) + evening (night) comprehensive
  // assessments, plus meds/meals/vitals/sleep present. Gates the "feasible-later" analyses.
  wellSampledCount(){ const byDay={}; D().assessments.forEach(a=>{ (byDay[dayKey(a.ts)]=byDay[dayKey(a.ts)]||[]).push(a); });
    let ct=0;
    Object.keys(byDay).forEach(dk=>{ const list=byDay[dk];
      const morning=list.some(a=>(a.cadence==='daily'||a.cadence==='weekly')&&a.variant==='am');
      const evening=list.some(a=>(a.cadence==='daily'||a.cadence==='weekly')&&(a.variant==='pm'||a.variant==null));
      const md=(D().mealDays||{})[dk]; const meals=md&&['breakfast','lunch','dinner'].every(m=>md[m]!=null);
      const glucose=list.some(a=>(a.glucose||[]).length)||D().vitals.some(x=>x.type==='glucose'&&dayKey(x.ts)===dk);
      const sleep=list.some(a=>a.sleep&&a.sleep.totalSleepMin!=null);
      if(morning&&evening&&meals&&glucose&&sleep) ct++;
    });
    return ct;
  },
  // COMPOUND / INTERACTION effects: does exposure A *together with* B predict an outcome
  // beyond either alone? (e.g. caffeine + Concerta → agitation). Bounded to a curated set.
  findInteractions(vecs, V, mainBest){
    const exposures=Object.keys(V).filter(k=> k.startsWith('cogmed_') || (k.startsWith('ep_')&&k.endsWith('_active'))
      || (k.startsWith('rx_')&&k.endsWith('_active')) || k==='nicotine' || (k.startsWith('med_')&&k.endsWith('_change')))
      .filter(k=>vecs.some(v=>v[k]!=null));
    const outs=['agitation','anxiety','sleepMin','sleepQuality','brainFog','fatigue','pem','cogFatigue','iceBrain','depression','overstim']
      .filter(k=>V[k]&&vecs.some(v=>v[k]!=null));
    const mean=a=>a.length?a.reduce((s,x)=>s+x,0)/a.length:null;
    // binarize an exposure: counts/binary flags at >0, graded values at their median
    // absence of a count/flag exposure means 0 (didn't happen), not "missing"
    const binOf=k=>{ const vals=vecs.map(v=>v[k]).filter(x=>x!=null); if(vals.length<4)return null;
      const distinct=new Set(vals.map(x=>Math.round(x*100)));
      const thr = distinct.size<=3 ? 0 : Stats.median(vals);
      return v=> ((v[k]==null?0:v[k])>thr?1:0); };
    const out=[];
    for(let i=0;i<exposures.length;i++) for(let j=i+1;j<exposures.length;j++){
      const A=exposures[i], B=exposures[j]; const bA=binOf(A), bB=binOf(B); if(!bA||!bB) continue;
      for(const O of outs){
        const g={none:[],a:[],b:[],both:[]};
        vecs.forEach(v=>{ const o=v[O]; if(o==null)return; const a=bA(v),b=bB(v);
          (a&&b?g.both:a?g.a:b?g.b:g.none).push(+o); });
        if(g.both.length<4 || g.a.length<2 || g.b.length<2) continue; // need real co-occurrence + singles
        const allO=vecs.map(v=>v[O]).filter(x=>x!=null); const sd=Stats.sd(allO)||1;
        const mBoth=mean(g.both), mA=mean(g.a), mB=mean(g.b);
        // synergy = combo exceeds (or falls below) BOTH single-exposure groups in the same direction
        const liftA=mBoth-mA, liftB=mBoth-mB;
        if(Math.sign(liftA)!==Math.sign(liftB)) continue;
        const lift=Math.min(Math.abs(liftA),Math.abs(liftB)); const effect=lift/sd;
        if(effect<0.4) continue;
        const conf=clamp(Math.round((0.55*Math.min(1,effect/1.3)+0.25*Math.min(1,g.both.length/14)+0.2)*100),25,100);
        const cA=(mainBest[A+'|'+O]||{}).conf||0, cB=(mainBest[B+'|'+O]||{}).conf||0;
        out.push({ a:A, b:B, o:O, aLabel:V[A].label, bLabel:V[B].label, oLabel:V[O].label,
          r:(liftA>0?1:-1)*+effect.toFixed(2), n:g.both.length, conf, mainA:cA, mainB:cB,
          combo:+mBoth.toFixed(1), alone:+Math.max(mA,mB).toFixed(1) });
      }
    }
    return out.sort((a,b)=>b.conf-a.conf).slice(0,20);
  },
  // MEDIATION pathways X → M → Y (e.g. caffeine → poor sleep → anxiety): all three edges
  // must exist as findings. Reported as a candidate pathway, honestly not proven causation.
  findPathways(list, V){
    const byPair={}; list.forEach(f=>{ byPair[f.pk+'>'+f.ok]=f; });
    const mediators=['sleepQuality','sleepMin','fatigue','cogFatigue','pem','brainFog','agitation','overstim','anxiety']
      .filter(k=>V[k]);
    const out=[];
    list.forEach(xm=>{ const X=xm.pk, M=xm.ok; if(!mediators.includes(M)||X===M) return;
      list.forEach(my=>{ if(my.pk!==M) return; const Y=my.ok; if(Y===X||Y===M) return;
        const xy=byPair[X+'>'+Y]; if(!xy) return;                 // direct link must also exist
        if(xm.conf<40||my.conf<40) return;
        const conf=Math.min(xm.conf,my.conf,xy.conf+15);
        out.push({ x:X, m:M, y:Y, xLabel:V[X].label, mLabel:V[M].label, yLabel:V[Y].label,
          conf:Math.round(conf), legs:[xm.conf,my.conf,xy.conf] });
      });
    });
    // dedupe by X|M|Y, keep strongest
    const bp={}; out.forEach(p=>{ const k=p.x+'|'+p.m+'|'+p.y; if(!bp[k]||p.conf>bp[k].conf)bp[k]=p; });
    return Object.values(bp).sort((a,b)=>b.conf-a.conf).slice(0,12);
  },
  gapDays(vecs){ if(vecs.length<2)return 0; let gaps=0; for(let i=1;i<vecs.length;i++){ const d=Math.round((vecs[i]._ts-vecs[i-1]._ts)/DAY); if(d>1)gaps+=d-1; } return gaps; },
};
function confColor(c){ if(c>=75)return 'var(--green)'; if(c>=50)return 'var(--amber)'; if(c>=35)return '#ff9a5c'; return 'var(--red)'; }

/* ==========================================================================
   TRENDS — Robinhood-style multi-line SVG chart
   ========================================================================== */
const TF=[['1W',7],['1M',30],['3M',90],['1Y',365],['ALL',99999]];
let trendState={tf:'1M', lines:{qol:true,cog:true,nii:true}, scrub:null};
Views.trends=(v)=>{
  v.append(header('Trends',''));
  const all=Score.seriesAll();
  const days=TF.find(t=>t[0]===trendState.tf)[1];
  const cut=Date.now()-days*DAY;
  const data=all.filter(p=>p.ts>=cut);
  // header value + delta
  const info=el('div',{class:'card'});
  const valWrap=el('div',{id:'trendval'});
  info.append(valWrap);
  // chart
  const chart=el('div',{id:'chartbox'});
  info.append(chart);
  // timeframe pills
  const pills=el('div',{class:'seg',style:'margin-top:10px'});
  TF.forEach(t=>pills.append(el('button',{class:trendState.tf===t[0]?'on':'',onclick:()=>{trendState.tf=t[0];trendState.scrub=null;render();}},t[0])));
  info.append(pills);
  // line toggles
  const tog=el('div',{class:'row wrap',style:'gap:8px;margin-top:10px'});
  [['qol','QOL','var(--qol)'],['cog','Cognitive','var(--cog)'],['nii','Neuroinflammation','var(--nii)']].forEach(([k,lab,c])=>{
    tog.append(el('button',{class:'pill',style:`cursor:pointer;opacity:${trendState.lines[k]?1:.4};border-color:${c}`,
      onclick:()=>{trendState.lines[k]=!trendState.lines[k];render();}},

function drawChart(box, valBox, data){
  box.innerHTML=''; valBox.innerHTML='';
  if(data.length<2){ box.append(el('div',{class:'empty'},'Not enough data yet — log a few assessments to see trends.')); return; }
  const W=340,H=190,pad=6;
  const lines=[['qol','var(--qol)'],['cog','var(--cog)'],['nii','var(--nii)']].filter(l=>trendState.lines[l[0]]);
  const xs=data.map(d=>d.ts); const xmin=Math.min(...xs),xmax=Math.max(...xs);
  const X=t=>pad+(xmax===xmin?0.5:(t-xmin)/(xmax-xmin))*(W-2*pad);
  const Y=val=>H-pad-(val/100)*(H-2*pad);
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;touch-action:none">
    <defs><filter id="glow"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <line x1="${pad}" y1="${Y(50)}" x2="${W-pad}" y2="${Y(50)}" stroke="var(--line2)" stroke-dasharray="2 4"/>`
    + lines.map(([k,c])=>{ const pts=data.filter(d=>d[k]!=null); if(pts.length<2)return '';
      const dpath=pts.map((p,i)=>(i?'L':'M')+X(p.ts).toFixed(1)+' '+Y(p[k]).toFixed(1)).join(' ');
      return `<path d="${dpath}" fill="none" stroke="${c}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>`; }).join('')
    + `<line id="scrubline" x1="0" y1="${pad}" x2="0" y2="${H-pad}" stroke="var(--ink3)" opacity="0"/>`
    + `</svg>`;
  box.innerHTML=svg;
  // header current values
  const last=data[data.length-1], first=data[0];
  const showVals=(pt)=>{ valBox.innerHTML='';
    lines.forEach(([k,c])=>{ if(pt[k]==null)return; const delta=pt[k]-(first[k]||pt[k]);
      valBox.append(el('div',{class:'row',style:'gap:8px;align-items:baseline'},
        el('span',{style:`width:9px;height:9px;border-radius:50%;background:${c};display:inline-block`}),
        el('span',{style:`font-size:22px;font-weight:800;color:${c}`},Math.round(pt[k])),
        el('span',{style:`font-size:12px;color:${delta>=0?'var(--green)':'var(--red)'}`}, (delta>=0?'▲ ':'▼ ')+Math.abs(delta).toFixed(0)),
        el('span',{class:'muted',style:'font-size:11px'},({qol:'QOL',cog:'Cognitive',nii:'NII'})[k]))); });
    valBox.append(el('div',{class:'muted',style:'font-size:11px;margin-top:2px'},fmtDT(pt.ts))); };
  showVals(last);
  // scrub
  const svgEl=box.querySelector('svg'); const scrub=svgEl.querySelector('#scrubline');
  const onMove=e=>{ const rect=svgEl.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const sx=cx/rect.width*W; let nearest=data[0],nd=1e9; data.forEach(d=>{const dx=Math.abs(X(d.ts)-sx);if(dx<nd){nd=dx;nearest=d;}});
    scrub.setAttribute('x1',X(nearest.ts)); scrub.setAttribute('x2',X(nearest.ts)); scrub.setAttribute('opacity','.6'); showVals(nearest); };
  const onEnd=()=>{ scrub.setAttribute('opacity','0'); showVals(last); };
  svgEl.addEventListener('touchmove',onMove); svgEl.addEventListener('mousemove',e=>{if(e.buttons)onMove(e);});
  svgEl.addEventListener('touchend',onEnd); svgEl.addEventListener('mouseleave',onEnd);
}

   DEV SEED — synthetic multi-week dataset (hidden helper, for testing)
   ========================================================================== */
const Dev = {
  seed(nDays=70){
    const d=D(); const now=Date.now();
    // one IVIG every 14 days
    for(let day=nDays; day>=0; day--){
      const ts=now-day*DAY + 20*3600000/24*20; const rr=(Math.sin(day)+1)/2;
      const cycle=(nDays-day)%14; const ivigNear=cycle<3;
      const base=v=>clamp(Math.round(v),1,10);
      const sick=day>40&&day<46; // an illness episode
      const inflam= (cycle/14)*2 + (sick?3:0) + (Math.random()*1.5);
      const a={ id:uid(), ts, cadence: ((nDays-day)%7===0)?'weekly':'daily',
        sliders:{ fatigue:base(4+inflam), cogFatigue:base(3+inflam), brainFog:base(3+inflam),
          depression:base(3+inflam*0.7), anxiety:base(4+Math.random()*2), sleepQuality:base(7-inflam*0.5),
          overstim:base(4+inflam*0.4), pem:base(2+inflam*0.6+ (day%9===0?3:0)), iceBrain:base(2+inflam*0.5),
          emotEngagement:base(6-inflam*0.4), visualDistortion:base(2+inflam*0.3), rumination:base(4+Math.random()*3),
          emotStressors:base(3+Math.random()*3), envStressors:base(3+Math.random()*2), generalStress:base(4+Math.random()*3),
          maritalStress:base(3+Math.random()*2), socializing:base(3+Math.random()*4), nicotine:base(1+Math.random()*2)%4+1,
          moodEnd:base(7-inflam*0.5+Math.random()*2), moodWake:base(6-inflam*0.4+Math.random()*2) },
        exertion:{ mental:base(4+Math.random()*4), physical:base(3+Math.random()*4) },
        sleep:{ totalSleepMin:Math.round(360+Math.random()*140-inflam*15), efficiency:Math.round(80-inflam*3+Math.random()*10) },
        meals:{ count:['2','3','3+'][Math.floor(Math.random()*3)], quality:base(6-inflam*0.3), consistency: Math.random()<0.2?'skip':'normal', skipIntent: Math.random()<0.5?'intentional':'unintended' },
        meds:[], glucose:[{slot:'Wake',value:Math.round(88+Math.random()*20),ts},{slot:'Noon',value:Math.round(100+Math.random()*40+inflam*4),ts},{slot:'8pm',value:Math.round(95+Math.random()*30),ts}], bp:null,
        selfCare:[ ...(Math.random()<0.4?['Meditated']:[]), ...(Math.random()<0.2?['Cold plunge']:[]), ...(Math.random()<0.3?['Designated resting']:[]), ...(inflam>3&&Math.random()<0.6?['Nap x1']:[]), ...(Math.random()<0.3?['Recreational activities']:[]) ], notes:'' };
      if((nDays-day)%14===0) a.meds.push({medId:'ivig',dose:'Infusion',ts,deviation:'added',purpose:'Immunomodulation'});
      // Concerta streak: taken days 30..26 then STOPPED — models a rebound-PEM scenario
      const inStreak=(day<=30&&day>=26);
      if(inStreak) a.meds.push({medId:'concerta',dose:36,unit:'mg',changeType:'acute',ts,deviation:'changed',purpose:'Executive function'});
      else if(Math.random()<0.3) a.meds.push({medId:'concerta',dose:[18,36,54][Math.floor(Math.random()*3)],unit:'mg',changeType:'acute',ts,deviation:'changed',purpose:'Executive function'});
      // amplify PEM in the ~10 days after the streak stops (day 25..16)
      if(day<26&&day>=16){ a.sliders.pem=clamp(a.sliders.pem+ (26-day<=5?4:2),1,10); }
      if(a.cadence==='weekly'){ a.objective={ obj_processingSpeed:clamp(20+inflam*8+Math.random()*10,0,100),
        obj_rtVariability:clamp(15+inflam*7+Math.random()*10,0,100), obj_workingMemory:clamp(20+inflam*5,0,100),
        obj_attention:clamp(20+inflam*6,0,100), obj_recall:clamp(2+inflam*0.5,0,10) };
        a.questionnaires={ dass21:{dep:Math.round(inflam*3),anx:Math.round(8+Math.random()*6),stress:Math.round(10+inflam*2)} }; }
      d.assessments.push(a);
    }
    // illness episode
    d.episodes.push({id:uid(),kind:'illness',startTs:now-46*DAY,endTs:now-40*DAY});
    d.episodes.push({id:uid(),kind:'childcare',startTs:now-10*DAY,endTs:now-8*DAY});
    d.events.push({id:uid(),date:dayKey(now-43*DAY),type:'Relapse',note:'seeded'});
    Store.saveNow();
  },
};

  if(f.fdr) badges.append(badge('FDR-significant','#3dff9a')); else badges.append(badge('exploratory','#ffcf5c'));
  if(f.nonMonotonic) badges.append(badge('non-monotonic','#b06bff'));

  detail.innerHTML=`Kendall τ (raw)=${f.rObs} · detrended τ=${f.tauDet} · distance-corr=${f.dcor} · n=${f.n} day-pairs · lag=${f.lag}d · p=${f.p!=null?f.p.toFixed(3):'—'} (FDR ${f.fdr?'passed':'not passed'})`
    +(f.prior?' · nudged by a literature prior':' · purely data-driven')

    +(f.nonMonotonic?'<br><b style="color:var(--purple)">non-monotonic</b> — detected by distance correlation; the relationship isn\'t a single straight direction.':'')
    +(f.confound?'<br><b style="color:var(--amber)">⚠ possibly confounded</b> — may share a common cause.':'')

}

    D().regimen.push(row); this.logChange(row); Store.saveNow(); render(); },

    D().medLogs.push({medId:row.medId, dose:row.dose===''?0:(isNaN(+row.dose)?row.dose:+row.dose), unit:(m&&m.unit)||'mg', changeType:row.freq==='acute'?'acute':'chronic', ts:Date.now(), purpose:m&&m.purpose, deviation:(row.dose===0||row.dose==='')?'missed':'added'});

/* Fetch the FDA drug-label pharmacokinetics section for reference (reputable source).
   Shows the label text so the user can set onset/peak/duration; does not silently overwrite. */
const PKLookup = {
  async fetch(m){ toast('Searching openFDA…');
    try{
      const q=encodeURIComponent('openfda.brand_name:"'+m.name+'"+openfda.generic_name:"'+m.name+'"');
      const res=await fetch('https://api.fda.gov/drug/label.json?search='+q+'&limit=1');
      const j=await res.json();
      const r=j.results&&j.results[0];
      const pk=(r&&(r.pharmacokinetics||r.clinical_pharmacology))||[];
      const text=(Array.isArray(pk)?pk.join(' '):String(pk||'')).slice(0,1400)||'No pharmacokinetics section found in the FDA label.';
      const scrim=el('div',{class:'scrim'}); const close=()=>scrim.remove();
      scrim.append(el('div',{class:'dlg',style:'max-height:80vh;overflow:auto'}, el('h3',{},m.name+' — FDA label PK'),
        el('p',{class:'muted',style:'font-size:12px;line-height:1.5'},text),
        el('p',{class:'muted',style:'font-size:11px'},'Use Tmax for "peak", and half-life × ~4 as a rough "duration". Enter values in the fields; nothing is auto-changed.'),
        el('div',{class:'acts'}, el('button',{class:'btn primary',onclick:close},'Got it'))));
      scrim.addEventListener('click',e=>{if(e.target===scrim)close();}); document.body.append(scrim);
    }catch(e){ toast('Offline or no FDA match — enter PK manually'); }
  },
};

   SCIENCE / METHODS PAGE — "everything behind the scenes"
   A dedicated, plain-language account of what the app measures, how every
   index and correlation is computed, what the IVIG pharmacology knowledge is,
   how confident the trend-detection currently is, and every source. Reachable
   from Settings and the NII model card. Nothing here is hidden in code.
   ========================================================================== */
// Sources specific to the methods + IVIG pharmacology described on this page.
const SCIENCE_SOURCES={
  'Correlation & statistics methods':[
    ['Kendall rank correlation (τ-b)','Monotonic association robust to ties — better than Spearman for tied ordinal sliders at small n.','https://en.wikipedia.org/wiki/Kendall_rank_correlation_coefficient'],
    ['Distance correlation (Székely, Rizzo & Bakirov, 2007)','Detects ANY dependence, including non-monotonic (U-shaped) relationships a rank correlation misses.','https://en.wikipedia.org/wiki/Distance_correlation'],
    ['Benjamini–Hochberg FDR (1995)','Controls the false-discovery rate when many pairs are tested at once.','https://en.wikipedia.org/wiki/False_discovery_rate'],
    ['n-of-1 / single-case methodology','The statistical frame for one person tracked intensively over time.','https://en.wikipedia.org/wiki/N_of_1_trial'],
    ['Bayesian shrinkage toward priors','Small-n estimates pulled toward literature expectation; the data takes over as n grows.','https://en.wikipedia.org/wiki/Shrinkage_(statistics)'],
    ['EWMA smoothing','Exponentially-weighted moving average used for the NII trend line.','https://pmc.ncbi.nlm.nih.gov/articles/PMC10248291/'],
  ],
  'IVIG pharmacokinetics & half-life':[
    ['StatPearls — IVIG (NBK554446)','Infused IgG median half-life ~23 days (18–25 d healthy; 33–36 d in immunodeficiency).','https://www.ncbi.nlm.nih.gov/books/NBK554446/'],
    ['Gammagard Liquid — FDA label','Elimination half-life median 35 days (95% CI 31–42).','https://www.drugs.com/pro/gammagard-liquid.html'],
    ['Privigen — FDA label','3-week dosing t½ ~27.6 d; 4-week ~45 d; individual range 21–97 d.','https://www.drugs.com/pro/privigen.html'],
    ['Berger 2016 — IVIG "wear-off" at end of cycle','Trough IgG dips before the next infusion; justifies days-since-IVIG.','https://pmc.ncbi.nlm.nih.gov/articles/PMC4792336/'],
    ['Roopenian & Akilesh 2007 — FcRn','FcRn recycling sets IgG half-life; saturable at high dose (dose-dependent kinetics).','https://www.nature.com/articles/nri2155'],
  ],
  'IVIG anti-inflammatory mechanisms':[
    ['Schwab & Nimmerjahn 2013 — Nat Rev Immunol','Master review: how IgG modulates the immune system (FcγR blockade, FcγRIIB, sialylated Fc, Treg induction).','https://www.nature.com/articles/nri3401'],
    ['Kaneko, Nimmerjahn & Ravetch 2006 — Science','Anti-inflammatory activity of IgG requires terminal α2,6-Fc sialylation.','https://pubmed.ncbi.nlm.nih.gov/16888140/'],
    ['Fehr, Hofmann & Kappeler 1982 — NEJM','Founding evidence of reticuloendothelial FcγR blockade in ITP (24–48 h platelet rise, transient).','https://pubmed.ncbi.nlm.nih.gov/6803159/'],
    ['Debré et al. 1993 — Lancet','Fcγ fragments alone reproduce the effect → the Fc–FcγR interaction is the operative mechanism.','https://pubmed.ncbi.nlm.nih.gov/8105212/'],
    ['Almizraq & Branch 2022 — Annals of Blood','Adult-ITP mechanism review; response transient, ~3–4 weeks without re-dosing.','https://aob.amegroups.org/article/view/6137/html'],

};
Views.science=(v)=>{
  v.append(el('div',{class:'hdr'}, el('div',{class:'row'},
    el('button',{class:'btn sm ghost',onclick:()=>go('settings')},'‹ Back'),
    el('h1',{style:'font-size:18px;margin-left:6px'},'The science, in the open'))));
  // small local helpers
  const P=(t)=>el('p',{class:'muted',style:'line-height:1.65;font-size:13px;margin:6px 0'},t);
  const H=(t)=>el('h3',{style:'margin:14px 0 4px'},t);
  const UL=(arr)=>el('ul',{class:'muted',style:'line-height:1.6;font-size:12.5px;padding-left:18px;margin:6px 0'},...arr.map(x=>el('li',{},x)));
  const sec=(title,...kids)=>{ const c=el('div',{class:'card'}); c.append(el('h2',{},title)); kids.forEach(k=>k&&c.append(k)); v.append(c); return c; };
  const tag=(txt,color)=>el('span',{class:'pill',style:`font-size:10px;border-color:${color||'var(--line)'}`},txt);

  // 1 — what it is
  sec('What NeuroTrack is',
    P('A personal instrument for watching neurological function recover — or wobble — after autoimmune encephalitis, and for relating those changes to sleep, meals, exertion, medication changes, illness, and where you are in the IVIG cycle.'),
    P('It is one self-contained web page. No server, no account, no network calls for your data. Everything you enter lives only in this device\'s local storage; the JSON backup is the only copy that ever leaves. It works fully offline once loaded.'),
    H('Two cadences'),
    UL(['Daily end-of-day check-in (~5–8 min): sliders, sleep, meals, exertion, medication deviations, vitals — no cognitive tests.',
        'Weekly full baseline (~30–45 min): everything above plus the objective cognitive battery and rotating questionnaires. Stimuli are re-seeded each week so you are not memorising the same test.']));

  // 2 — data flow
  sec('How your data becomes a number',
    P('Each day is compressed into one feature vector — every slider, derived sleep metric, meal descriptor, vital, medication deviation, episode state, days-since-IVIG, and (on weekly days) each cognitive score. Three things read that vector:'),
    UL(['The three headline lines (QOL, Cognitive, NII).',
        'The correlation engine, which pairs every predictor against every outcome across several time lags.',
        'The IVIG effect model, which adds "how much infusion is on board" as context.']),
    P('None of it is sent anywhere. The math below runs entirely in your browser.'));

  // 3 — the three lines
  const s3=sec('The three headline lines');
  s3.append(el('div',{class:'row',style:'gap:8px;margin:4px 0 10px'},
    tag('QOL — higher = better','var(--qol)'), tag('Cognitive — higher = better','var(--cog)'), tag('NII — higher = worse','var(--nii)')));
  s3.append(H('Robust normalisation (shared by all three)'));
  s3.append(P('Every raw measure is turned into a robust z-score against your OWN rolling history, not a textbook norm:'));
  s3.append(el('div',{class:'card',style:'background:var(--bg2);font-family:ui-monospace,monospace;font-size:12px;line-height:1.7'},
    'z = orient · (x − median) / (1.4826 · MAD)'));
  s3.append(P('Median and MAD (median absolute deviation) are used instead of mean/SD so a single terrible day cannot distort your baseline. "orient" flips measures where lower is worse (e.g. sleep quality). z is clamped to ±4.'));
  s3.append(H('QOL & Cognitive Ability'));
  s3.append(P('Each mapped measure contributes a weighted burden to QOL, Cognitive, or both. The objective test composite is then ATTENUATED by your subjective state that day — a strong test taken on a high-fatigue day is discounted (strength α, editable in Settings). The summed burden is inverted so the chart reads intuitively: up = better.'));
  s3.append(H('Neuroinflammation Index (NII)'));
  s3.append(P('A symptom-derived PROXY, not a biomarker — it measures no cytokines, antibodies, or imaging. It is a weighted composite of the inflammation-linked "sickness-behaviour" cluster (fatigue, cognitive fatigue, brain fog, low emotional engagement, poor sleep, PEM, somatic depression, plus objective processing speed and reaction-time variability), each robust-z\'d as above, then EWMA-smoothed (λ=0.25) and floor-anchored:'));
  s3.append(UL(['Your ~10th percentile of burden maps to ≈10 ("your calm floor").',
        'Your ~90th percentile maps to ≈85, leaving headroom for a true flare.',
        'The floor adapts slowly as you recover, so genuine improvement lowers the whole line.',
        'It shows "calibrating" until ~'+D().settings.calibrateMin+' assessments across an IVIG cycle exist.']));
  s3.append(el('button',{class:'btn sm ghost',style:'margin-top:8px',onclick:()=>go('insights','modelcard')},'See every NII weight (model card) →'));

  // 4 — correlation engine feasibility
  const s4=sec('The correlation engine — what it can and can\'t do');
  s4.append(P('Detecting real patterns from one person\'s self-report is genuinely hard. Rather than pretend every fancy method works at this scale, the engine is split into three honest tiers.'));
  const tierRow=(band,color,title,body)=>el('div',{style:'padding:9px 0;border-bottom:1px solid var(--line)'},
    el('div',{class:'row'}, tag(band,color), el('div',{style:'flex:1;font-size:13px;font-weight:600;margin-left:8px'},title)),
    el('div',{class:'muted',style:'font-size:12px;line-height:1.55;margin-top:4px'},body));
  s4.append(tierRow('ACTIVE NOW','var(--green)','Feasible today — built and running',
    'Kendall τ-b (monotonic association), distance correlation (any dependence, incl. U-shapes), trend-detrending to kill spurious shared-drift pairs, multi-lag testing (0, 1, 2, 3, 7 days), Benjamini–Hochberg FDR flagging, shrinkage toward literature priors, and plain type + definition labels on every finding.'));
  s4.append(tierRow('READING, INACTIVE','var(--amber)','Feasible later — needs ~100 well-sampled days',
    'Compound / moderation effects (two things that together predict more than either alone) and dose-response-shape fits. These keep reading your data every day but stay silent until 100 well-sampled days exist — a complete day with morning + evening comprehensive assessments plus meds, meals, vitals and sleep, within a 7-day rolling window. They need the extra data to be honest, not to be a gimmick.'));
  s4.append(tierRow('LEFT OUT','#ff9a5c','Not achievable honestly offline — deliberately omitted',
    'Formal causal mediation / pathway models, canonical correlation, network / graphical models, and latent structural-equation models. At one-person sample sizes these would produce confident-looking claims the data cannot support, so they are not shipped. This is a choice, not a missing feature.'));

  // 5 — statistics plainly
  const s5=sec('The statistics, in plain language');
  s5.append(H('Why Kendall τ, not just Spearman'));
  s5.append(P('The sliders are 1–10 ordinal values with lots of ties. Kendall τ-b handles ties correctly and is more stable than Spearman at small n. It answers: "when this goes up, does that tend to go up too?"'));
  s5.append(H('Why also distance correlation'));
  s5.append(P('Some real relationships are not straight lines — e.g. both too little and too much of something is bad (a U-shape). A rank correlation reads that as ≈0. Distance correlation catches it, so those findings get a "non-monotonic" badge instead of being missed.'));
  s5.append(H('Guarding against fake trends'));
  s5.append(P('If two things both drift over weeks (say, both slowly improve), they will correlate even if unrelated. Before correlating, each series is DETRENDED by subtracting its local rolling median, so only genuine day-to-day co-movement counts. A pair that looks strong raw but vanishes detrended is flagged "possibly trend-driven".'));
  s5.append(H('Priors + shrinkage (the "trains itself" part)'));
  s5.append(P('Pairs with a known literature relationship start from a prior; the observed estimate is pulled toward it and blended as r = (k₀·r₀ + n·r_obs)/(k₀ + n). At 5 data points the prior dominates (no wild claims); as your history grows, your own data takes over and the prior washes out.'));
  s5.append(H('Confidence 25–100%'));
  s5.append(P('A blend of effect size, evidence mass (grows with n), and reproducibility (does the pattern hold across split time-windows?). Anything under 25% is suppressed. Because many pairs are tested, borderline hits are FDR-flagged and single-window flukes are penalised — and the app never says "X caused Y", only "X and Y move together, with this timing".'));

  // 6 — IVIG pharmacology
  const s6=sec('IVIG — the pharmacology the algorithm carries');
  s6.append(P('Your maintenance IVIG is modelled as an "effect on board" curve so the engine knows an infusion day is not like day 13 of a cycle. It is the sum of a fast acute term and a slow sustained term:'));
  s6.append(el('div',{class:'card',style:'background:var(--bg2);font-family:ui-monospace,monospace;font-size:12px;line-height:1.7'},
    'E(t) = wA·Acute(t) + wS·Sustained(t)',el('br',{}),
    'Sustained(t) = exp(−ln2 / 23 · t)   (IgG t½ ≈ 23 d)',el('br',{}),
    'Acute(t) = norm·(exp(−t/tf) − exp(−t/tr))'));
  s6.append(P('IV route weights the acute spike more (wA 0.4 / wS 0.6, peak ~day 1, gone ~day 7). Subcutaneous is flatter and steadier (wA 0.1 / wS 0.9, slower onset) — lower peaks, smaller peak-to-trough swing, so end-of-cycle "wear-off" is gentler. The modelled curve the app actually uses right now:'));
  // live curve strip from the real model
  const days=[0,1,2,3,5,7,10,14,21,28];
  const strip=el('div',{style:'display:flex;gap:5px;align-items:flex-end;height:70px;margin:8px 0'});
  days.forEach(d=>{ const e=Med.ivigEffect(d,'iv'); const h=Math.round(e.total*64)+2;
    strip.append(el('div',{style:'flex:1;display:flex;flex-direction:column;align-items:center;gap:3px'},
      el('div',{style:`width:100%;height:${h}px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--nii),var(--qol))`}),
      el('div',{class:'muted',style:'font-size:9px'},'d'+d))); });
  s6.append(strip);
  s6.append(el('div',{class:'muted',style:'font-size:10.5px;margin-bottom:6px'},'IV route · bar height = total modelled effect (acute + sustained), % of peak'));
  s6.append(H('Acute anti-inflammatory actions (first ~3 days)'));
  const mech=(name,how,ev,evc)=>el('div',{style:'padding:7px 0;border-bottom:1px solid var(--line)'},
    el('div',{class:'row'}, el('div',{style:'flex:1;font-size:12.5px;font-weight:600'},name), tag(ev,evc)),
    el('div',{class:'muted',style:'font-size:11.5px;line-height:1.5;margin-top:3px'},how));
  s6.append(mech('FcγR blockade / saturation','Infused IgG occupies activating Fcγ receptors on macrophages, so antibody-coated cells stop being cleared. Founding ITP evidence; platelet rise in 24–48 h, transient.','strong','var(--green)'));
  s6.append(mech('FcRn saturation','High-dose IgG saturates the FcRn recycling receptor, accelerating catabolism of pathogenic autoantibodies (and shortening IVIG\'s own half-life at high dose).','strong','var(--green)'));
  s6.append(mech('Complement scavenging','Infused IgG soaks up activated complement (C3b/C4b), blunting complement-mediated tissue damage.','moderate','var(--amber)'));
  s6.append(mech('Cytokine neutralisation & anti-idiotypic binding','Anti-idiotypic antibodies and cytokine binding damp the acute inflammatory signal.','moderate','var(--amber)'));
  s6.append(H('Chronic / sustained actions (peak, then decay over the half-life)'));
  s6.append(mech('Sialylated-Fc → FcγRIIB upregulation','The α2,6-sialylated fraction raises the inhibitory receptor FcγRIIB threshold on effector cells — an ACTIVE immunomodulatory effect, not just steric blockade.','strong','var(--green)'));
  s6.append(mech('Regulatory T-cell induction','IVIG expands/induces Tregs, shifting the balance away from autoreactive inflammation over days–weeks.','moderate','var(--amber)'));
  s6.append(mech('Dendritic-cell modulation & B-cell homeostasis','Dampened DC activation and restored B-cell homeostasis lower the chronic inflammatory set-point.','moderate','var(--amber)'));
  s6.append(mech('End-of-cycle wear-off','As serum IgG falls toward trough before the next infusion, these effects fade — the basis for the days-since-IVIG variable.','moderate','var(--amber)'));

  // 7 — honest confidence
  const nDays=(()=>{ const s=new Set(); D().assessments.forEach(a=>s.add(dayKey(a.ts))); return s.size; })();
  const ws=(Insights.wellSampledCount?Insights.wellSampledCount():0);
  const s7=sec('How much should you trust the trends right now?');
  s7.append(el('div',{class:'row',style:'gap:8px;margin-bottom:8px'},
    el('div',{class:'card',style:'flex:1;text-align:center;margin:0'}, el('div',{style:'font-size:22px;font-weight:800;color:var(--qol)'},String(nDays)), el('div',{class:'muted',style:'font-size:10px'},'days logged')),
    el('div',{class:'card',style:'flex:1;text-align:center;margin:0'}, el('div',{style:'font-size:22px;font-weight:800;color:var(--amber)'},ws+' / 100'), el('div',{class:'muted',style:'font-size:10px'},'well-sampled days'))));
  s7.append(P(nDays<14
    ? 'Very early. The lines will move a lot as your baseline forms, and no correlation should be taken seriously yet — the engine keeps everything conservative by leaning on priors.'
    : nDays<45
    ? 'Enough for the headline lines to be meaningful and for the strongest, most reproducible correlations to surface. Treat single-window or low-confidence findings as hypotheses, not facts.'
    : 'A solid base. Reproducible, FDR-surviving correlations are worth attention; the advanced (moderation / dose-response) analyses unlock once well-sampled days reach 100.'));
  s7.append(P('Honest limits that never go away: this is one person\'s self-report, correlation is not causation, the NII is a symptom proxy not a lab value, and the IVIG curve is a population-average model — your real kinetics vary. Use rising trends as a prompt to rest and check sleep/stress, and talk to your neurologist about anything that climbs and stays high.'));

  // 8 — sources
  Object.keys(SCIENCE_SOURCES).forEach(secName=>{ const c=el('div',{class:'card'}); c.append(el('h2',{},secName));
    SCIENCE_SOURCES[secName].forEach(([t,d,u])=>c.append(el('a',{href:u,target:'_blank',style:'display:block;padding:9px 0;border-bottom:1px solid var(--line)'},
      el('div',{style:'font-size:13px;font-weight:600;color:var(--ink)'},t), el('div',{class:'muted',style:'font-size:11.5px'},d))));
    v.append(c); });
  v.append(el('button',{class:'btn ghost block',style:'margin-bottom:6px',onclick:()=>go('sources')},'❋ Clinical instruments & neuroinflammation sources →'));
  v.append(el('div',{class:'banner pink',style:'margin-bottom:16px'}, el('span',{class:'bic'},'⚕️'),

/* ==========================================================================
   EXPORT — CSV / JSON / ICS
   ========================================================================== */
const Export={
  download(name,text,type){ const blob=new Blob([text],{type:type||'text/plain'}); const url=URL.createObjectURL(blob);
    const a=el('a',{href:url,download:name}); document.body.append(a); a.click(); setTimeout(()=>{a.remove();URL.revokeObjectURL(url);},500); },
  csv(range){ const now=Date.now(); const cut={week:7,month:30,year:365,all:1e9}[range]*DAY;
    const rows=D().assessments.filter(a=>now-a.ts<=cut).sort((a,b)=>a.ts-b.ts);
    const sk=CONFIG.sliders.map(s=>s.key);
    const head=['date','time','cadence',...sk,'mentalExert','physicalExert','sleepMin','sleepEff','mealCount','mealQuality','daysSinceIVIG','qol','cog','nii','obj_procSpeed','obj_rtVar','dass_dep','dass_anx','dass_stress','notes'];
    const scores=Score.seriesAll(); const nii=Neuro.series();
    const esc=s=>'"'+String(s==null?'':s).replace(/"/g,'""')+'"';
    const lines=[head.join(',')];
    rows.forEach(a=>{ const sc=scores.find(x=>x.id===a.id)||{}; const nv=nii.find(x=>x.id===a.id)||{};
      const q=a.questionnaires||{};
      lines.push([dayKey(a.ts),fmtT(a.ts),a.cadence,...sk.map(k=>a.sliders[k]==null?'':a.sliders[k]),
        a.exertion&&a.exertion.mental,a.exertion&&a.exertion.physical,a.sleep&&a.sleep.totalSleepMin,a.sleep&&a.sleep.efficiency,
        a.meals&&a.meals.count,a.meals&&a.meals.quality,Derive.daysSinceIVIG(a.ts),
        sc.qol!=null?Math.round(sc.qol):'',sc.cog!=null?Math.round(sc.cog):'',nv.nii!=null?Math.round(nv.nii):'',
        a.objective&&Math.round(a.objective.obj_processingSpeed),a.objective&&Math.round(a.objective.obj_rtVariability),
        q.dass21&&q.dass21.dep,q.dass21&&q.dass21.anx,q.dass21&&q.dass21.stress,esc(a.notes)].join(',')); });
    this.download('neurotrack-'+range+'-'+dayKey(now)+'.csv',lines.join('\n'),'text/csv'); toast('CSV exported'); },
  json(){ this.download('neurotrack-backup-'+dayKey(Date.now())+'.json',JSON.stringify(D(),null,2),'application/json'); toast('Backup exported'); },
  importJSON(){ const inp=el('input',{type:'file',accept:'.json'}); inp.addEventListener('change',()=>{ const f=inp.files[0]; if(!f)return;
    const rd=new FileReader(); rd.onload=()=>{ try{ const obj=JSON.parse(rd.result); if(!obj.schemaVersion)throw 0;
      confirmDlg('Restore this backup?','Replaces all current data.',()=>{ Store.load(obj); go('home'); toast('Restored'); }); }catch(e){ toast('Invalid backup file'); } };
    rd.readAsText(f); }); inp.click(); },
  ics(){ const dtstamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const dow=['SU','MO','TU','WE','TH','FR','SA'][D().settings.weeklyDow]; const wh=String(D().settings.weeklyHour).padStart(2,'0');
    let ics='BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//NeuroTrack//EN\n';
    const ev=(uidx,summ,rrule,hhmm)=>{ ics+='BEGIN:VEVENT\nUID:'+uidx+'@neurotrack\nDTSTAMP:'+dtstamp+'\nDTSTART:20240101T'+hhmm+'00\nRRULE:'+rrule+'\nSUMMARY:'+summ+'\nBEGIN:VALARM\nTRIGGER:-PT0M\nACTION:DISPLAY\nDESCRIPTION:'+summ+'\nEND:VALARM\nEND:VEVENT\n'; };
    if(D().reminders.find(r=>r.id==='moodWake'&&r.on)) ev('moodwake','NeuroTrack — morning mood + wake glucose','FREQ=DAILY','0800');
    if(D().reminders.find(r=>r.id==='daily'&&r.on)) ev('daily','NeuroTrack — end-of-day mood + check-in','FREQ=DAILY','2000');
    const amh=String(D().settings.weeklyAmHour||7).padStart(2,'0');
    if(D().reminders.find(r=>(r.id==='weeklyAm'||r.id==='weekly')&&r.on)) ev('weeklyam','NeuroTrack — full baseline (~45 min)','FREQ=WEEKLY;BYDAY='+dow, amh+'00');
    if(D().reminders.find(r=>r.id==='weekly'&&r.on)) ev('weekly','NeuroTrack — full baseline (~45 min)','FREQ=WEEKLY;BYDAY='+dow, wh+'00');
    if(D().reminders.find(r=>r.id==='glucose'&&r.on)) ['0700','1200','1600','2000','2230'].forEach((t,i)=>ev('glu'+i,'NeuroTrack — glucose reading','FREQ=DAILY',t));
    if(D().reminders.find(r=>r.id==='bp'&&r.on)) ev('bp','NeuroTrack — blood pressure','FREQ=DAILY','0900');
    ics+='END:VCALENDAR';
    this.download('neurotrack-reminders.ics',ics,'text/calendar'); toast('Calendar exported — open to add alarms'); },
};
